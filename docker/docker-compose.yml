services:
  backend:
    build:
      context: ../backend/memciko-exercise
    container_name: memciko-backend
    ports:
      - "8080:8080"
  backend-tests:
    build:
      context: ../backend/memciko-exercise
    container_name: memciko-backend-tests
    command: mvn test


  frontend:
    build:
      context: ../frontend/memciko-client
    container_name: memciko-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend